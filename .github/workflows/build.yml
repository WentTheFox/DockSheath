name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build (swift build)
        run: swift build -c debug

      - name: Run tests
        run: swift test

  xcodebuild-sanity:
    # Runs in parallel with build-test rather than after it — xcodebuild
    # resolves the package into its own DerivedData rather than reusing
    # `.build`, so the two never shared build artifacts anyway; running them
    # as separate jobs just gets both results in the time of the slower one
    # instead of the sum of both, at no extra runner-minute cost.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Build via xcodebuild (sanity check the package opens/builds in Xcode)
        run: xcodebuild build -scheme DockSheath -destination 'platform=macOS'
