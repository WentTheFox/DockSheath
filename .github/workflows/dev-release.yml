name: Dev Release

# Automatically tags and publishes a pre-release build on every push to
# main, versioned by build time (Unix seconds) rather than semantic
# versioning. Real, intentional releases still go through release.yml by
# pushing a "vX.Y.Z" tag by hand.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  dev-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Determine version
        id: version
        run: |
          TIMESTAMP="$(date +%s)"
          VERSION="0.0.1-dev${TIMESTAMP}"
          TAG="v${VERSION}"
          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" \
            Sources/DockSheath/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.timestamp }}" \
            Sources/DockSheath/App/Info.plist

      - name: Build app bundle (Release)
        run: Scripts/build_app.sh release build

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - "build/DockSheath.app"

      - name: Verify signature
        run: codesign --verify --verbose "build/DockSheath.app"

      - name: Create DMG
        run: |
          hdiutil create -volname "DockSheath" \
            -srcfolder "build/DockSheath.app" \
            -ov -format UDZO \
            "build/DockSheath-${{ steps.version.outputs.version }}.dmg"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Automated dev build ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f61 # v2.0.5
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Dev build ${{ steps.version.outputs.version }}
          prerelease: true
          make_latest: "false"
          files: build/DockSheath-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
