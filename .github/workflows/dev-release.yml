name: Dev Release

# Tags and publishes a pre-release build versioned by build time (Unix
# seconds) rather than semantic versioning, on every push to main. The repo
# is public, so GitHub's macOS Actions runners are free here (the 10x
# minute-multiplier only applies to private repos).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  dev-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Determine version
        id: version
        run: |
          TIMESTAMP="$(date +%s)"
          VERSION="0.0.1-dev${TIMESTAMP}"
          TAG="v${VERSION}"
          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" \
            Sources/DockSheath/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.timestamp }}" \
            Sources/DockSheath/App/Info.plist

      - name: Build app bundle (Release)
        run: Scripts/build_app.sh release build

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - "build/DockSheath.app"

      - name: Verify signature
        run: codesign --verify --verbose "build/DockSheath.app"

      - name: Create DMG
        run: |
          hdiutil create -volname "DockSheath" \
            -srcfolder "build/DockSheath.app" \
            -ov -format UDZO \
            "build/DockSheath-${{ steps.version.outputs.version }}.dmg"

      - name: Publish GitHub Release
        # Uses the gh CLI instead of a third-party action (see release.yml for
        # why) — this also creates the tag itself, pointed at this commit, so
        # no separate `git tag`/`git push` step is needed.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "build/DockSheath-${{ steps.version.outputs.version }}.dmg" \
            --title "Dev build ${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --generate-notes \
            --prerelease
