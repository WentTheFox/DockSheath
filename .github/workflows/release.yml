name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Determine version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" \
            Sources/DockSheath/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" \
            Sources/DockSheath/App/Info.plist

      - name: Build app bundle (Release)
        run: Scripts/build_app.sh release build

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - "build/DockSheath.app"

      - name: Verify signature
        run: codesign --verify --verbose "build/DockSheath.app"

      - name: Create DMG
        run: |
          hdiutil create -volname "DockSheath" \
            -srcfolder "build/DockSheath.app" \
            -ov -format UDZO \
            "build/DockSheath-${{ steps.version.outputs.version }}.dmg"

      - name: Publish GitHub Release
        # Pinned from best-effort recollection rather than a live lookup (this
        # session's GitHub access is scoped to this repo only, so softprops/
        # action-gh-release@v2's current tag SHA couldn't be verified directly
        # like the other pins below were, via their actual resolution in a
        # prior CI run). dependabot.yml will correct this if it's stale/wrong.
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f61 # v2.0.5
        with:
          files: build/DockSheath-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
