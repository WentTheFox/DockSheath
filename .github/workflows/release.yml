name: Release

on:
  push:
    tags:
      # Only real, hand-pushed semantic version tags — excludes the
      # "vX.Y.Z-devNNNNNNNNNN" tags dev-release.yml creates automatically.
      - "v*.*.*"
      - "!v*-dev*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Determine version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" \
            Sources/DockSheath/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" \
            Sources/DockSheath/App/Info.plist

      - name: Build app bundle (Release)
        run: Scripts/build_app.sh release build

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - "build/DockSheath.app"

      - name: Verify signature
        run: codesign --verify --verbose "build/DockSheath.app"

      - name: Create DMG
        run: |
          hdiutil create -volname "DockSheath" \
            -srcfolder "build/DockSheath.app" \
            -ov -format UDZO \
            "build/DockSheath-${{ steps.version.outputs.version }}.dmg"

      - name: Publish GitHub Release
        # Uses the gh CLI (preinstalled on GitHub-hosted runners, auto-authenticates
        # via GH_TOKEN) instead of a third-party action, so there's no action SHA
        # to pin/verify for this step. DockSheath is pre-1.0, so releases are
        # marked as pre-release for now.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "build/DockSheath-${{ steps.version.outputs.version }}.dmg" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --prerelease
